name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # actions/checkout v4.3.0
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      # oven-sh/setup-bun v2.2.0
      - name: Use Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      # --ignore-scripts is intentionally NOT used here: esbuild's postinstall
      # (lib/npm/node-platform.ts install.js) is required to select/link the
      # correct platform binary — skipping it breaks `bun run build`. Bun
      # already restricts lifecycle scripts to a curated trusted-package
      # default list (esbuild included), so this isn't an arbitrary-script risk.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build plugin
        run: bun run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css
